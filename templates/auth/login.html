{% extends "base.html" %}
{% block title %}Login — Exercise Finder{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">💪</div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your fitness hub</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="Your password" required />
          <button type="button" class="pw-toggle" id="login-pw-toggle" aria-label="Toggle password visibility" onclick="togglePw('password','login-pw-toggle')">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}
